<body class="bg-light">

  <div class="container mt-5">
    <div class="card shadow-lg p-4 text-center">

      <h3 class="text-primary mb-4">
        Remove a Paragraph from the DOM
      </h3>


      <p id="demo" class="lead">
        Click the button below, and this paragraph will be removed from the DOM.
      </p>


      <button class="btn btn-danger px-4" onclick="myFunction()">
        Remove Paragraph
      </button>

    </div>
  </div>

  <script>
    function myFunction() {
      let element = document.getElementById("demo");
      if (element) {
        element.remove();
      }
    }
  </script>

</body>
