  <div class="container mt-5">
    <div class="card shadow-lg p-4 text-center">

      <h3 class="text-primary mb-4">
        Change Font Weight and Color on Mouse Enter & Leave
      </h3>

      <p class="lead">Move the mouse over this paragraph.</p>
      <p class="lead">Web development tutorials</p>


    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      let paragraphs = document.querySelectorAll("p.lead");

      paragraphs.forEach(function (para) {

        para.addEventListener("mouseenter", function () {
          this.style.fontWeight = "bold";
          this.style.color = "blue";
        });

        para.addEventListener("mouseleave", function () {
          this.style.fontWeight = "normal";
          this.style.color = "black";
        });

      });

    });
  </script>

</body>
</html>
