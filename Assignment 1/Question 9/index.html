<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Question 9</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background-color: #f8f9fa; }
    .box { border: 2px dashed #0d6efd; padding: 15px; border-radius: 10px; }
    p { color: #212529; }
  </style>
</head>

<body class="bg-light">


  <header class="bg-dark text-white py-4 shadow">
    <div class="container text-center">
      <h1 class="fw-bold">Dynamic Websites & Applications</h1>
      <h4 class="text-warning">Module 1 – Question 9</h4>

      <hr class="bg-light">

      <p class="mb-1"><strong>Student Name:</strong> Alcardo Terlonge</p>
      <p class="mb-0"><strong>Lecturer:</strong> __________________________</p>
    </div>
  </header>


  <div class="container mt-5">
    <div class="card shadow-lg p-4">

      <h3 class="text-primary text-center mb-3">
        Retrieve and Display Style Properties
      </h3>

      <p class="text-muted text-center">
        Click the button to display the contents of the style tag.
      </p>

      <div class="text-center">
        <button class="btn btn-primary px-4" onclick="myFunction()">Try it</button>
      </div>


      <div class="mt-4 box bg-white">
        <p class="fw-semibold mb-2">Style Tag Contents:</p>
        <p id="demo" class="mb-0" style="white-space: pre-wrap;"></p>
      </div>

    </div>
  </div>

  <script>
    function myFunction() {
     
      const styleTag = document.querySelector("style");

      
      document.getElementById("demo").textContent = styleTag ? styleTag.innerHTML : "No <style> tag found.";
    }
  </script>

</body>
</html>
