  <div class="container mt-5">
    <div class="card shadow-lg p-4 text-center">

      <h3 class="text-primary mb-4">
        Change Paragraph Text Color on Hover
      </h3>

      <p class="lead">jQuery Exercises, Practice and Solution.</p>
      <p class="lead">Ajax Tutorial</p>

      <p class="text-muted mt-3">
        Move your mouse over any paragraph above.
      </p>

    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      let paragraphs = document.querySelectorAll("p.lead");

      paragraphs.forEach(function (para) {

        para.addEventListener("mouseover", function () {
          this.style.color = "red";
        });

        para.addEventListener("mouseout", function () {
          this.style.color = "black";
        });

      });

    });
  </script>

</body>
</html>
