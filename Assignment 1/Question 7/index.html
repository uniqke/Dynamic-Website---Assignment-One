<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Question 7</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <header class="bg-dark text-white py-4 shadow">
    <div class="container text-center">
      <h1 class="fw-bold">Dynamic Websites & Applications</h1>
      <h4 class="text-warning">Module 1 – Question 7</h4>

      <hr class="bg-light">

      <p class="mb-1"><strong>Student Name:</strong> Alcardo Terlonge</p>
      <p class="mb-0"><strong>Lecturer:</strong> __________________________</p>
    </div>
  </header>

  <div class="container mt-5">
    <div class="card shadow-lg p-4">

      <h3 class="text-primary text-center mb-3">
        Display a Message Based on Dropdown Selection
      </h3>

      <p class="text-muted text-center mb-4">
        Select an option from the dropdown to see a message.
      </p>

      <div class="row justify-content-center">
        <div class="col-12 col-md-6">
          <label for="topic" class="form-label fw-semibold">Choose a topic:</label>
          <select id="topic" class="form-select">
            <option value="">-- Select an option --</option>
            <option value="PSG">PSG</option>
            <option value="realmadrid">Real Madrid</option>
            <option value="barca">Barcelona</option>
            <option value="bayern">Bayern Munich</option>
          </select>

          <div id="message" class="alert alert-info mt-4 d-none" role="alert"></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const dropdown = document.getElementById("topic");
      const messageBox = document.getElementById("message");

      dropdown.addEventListener("change", function () {
        let msg = "";

        switch (this.value) {
          case "PSG":
            msg = "Paris Saint-Germain Football Club, commonly referred to as Paris Saint-Germain, PSG, Paris, or Paris SG, are a French professional football club based in Paris. Founded in 1970, following the merger of Paris FC and Stade Saint-Germain, they compete in Ligue 1, the top division of French football.";
            break;
          case "realmadrid":
            msg = "Real Madrid Club de Fútbol, commonly referred to as Real Madrid, is a Spanish professional association football club based in Madrid. The club competes in La Liga, the top tier of Spanish football. Founded in 1902 as Madrid Football Club, the club has traditionally worn a white home kit.";
            break;
          case "barca":
            msg = "Futbol Club Barcelona, commonly known as FC Barcelona and colloquially as Barça, is a professional football club based in Barcelona, Catalonia, Spain, that competes in La Liga, the top flight of Spanish football.";
            break;
          case "bayern":
            msg = "Fußball-Club Bayern München e. V., commonly known as Bayern Munich, FC Bayern or simply Bayern, is a German professional sports club based in Munich, Bavaria. They are most known for their men's professional football team, who play in the Bundesliga, the top tier of the German football league system";
            break;
          default:
            msg = "";
        }

        if (msg === "") {
          messageBox.classList.add("d-none");
          messageBox.textContent = "";
        } else {
          messageBox.classList.remove("d-none");
          messageBox.textContent = msg;
        }
      });
    });
  </script>

</body>
</html>
