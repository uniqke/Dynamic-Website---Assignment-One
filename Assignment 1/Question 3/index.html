<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Question 3</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <header class="bg-dark text-white py-4 shadow">
    <div class="container text-center">
      <h1 class="fw-bold">Dynamic Websites & Applications</h1>
      <h4 class="text-warning">Module 1 – Question 3</h4>

      <hr class="bg-light">

      <p class="mb-1"><strong>Student Name:</strong> Alcardo Terlonge</p>
      <p class="mb-0"><strong>Lecturer:</strong> __________________________</p>
    </div>
  </header>

  <div class="container mt-5">
    
    <div class="card shadow-lg p-4">

      <h3 class="text-primary mb-4 text-center">
        Add Red Border to All Textareas and Paragraphs
      </h3>

      <div class="mb-3">
        <textarea class="form-control mb-3">
HTML & CSS gives us structure and style
        </textarea>

        <textarea class="form-control mb-3">
JavaScript brings our webpage to life!!
        </textarea>

        <p class="lead">jQuery</p>
        <p class="lead">JavaScript</p>
      </div>

      <div class="text-center">
        <button id="button1" class="btn btn-danger px-4">
          Click to Check the Effect
        </button>
      </div>

    </div>
  </div>

<script src="main.js">
     document.getElementById("button1").onclick = function() {
      let elements = document.querySelectorAll("textarea, p.lead");

      elements.forEach(function(el) {
        el.style.border = "3px solid red";
        el.style.padding = "5px";
      });
    };
</script>

</body>
</html>
