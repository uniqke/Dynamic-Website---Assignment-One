  <div class="container mt-5">
    <div class="card shadow-lg p-4 text-center">

      <h3 class="text-primary mb-4">
        Display the Last Item of an Array
      </h3>

      <p class="text-muted">
        JavaScript array elements.
      </p>

  
      <p class="fw-semibold">Last fruit in the array:</p>
      <p id="demo" class="display-6 text-success fw-bold"></p>

      <button class="btn btn-primary mt-3 px-4" onclick="showLastFruit()">
        Show Last Fruit
      </button>

    </div>
  </div>

  <script>
    function showLastFruit() {
   
      let fruits = ["Apple", "Banana", "Mango", "Orange", "Pineapple"];

 
      let lastItem = fruits[fruits.length - 1];

      document.getElementById("demo").textContent = lastItem;
    }
  </script>
