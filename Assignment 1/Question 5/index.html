      <h3 class="text-primary mb-4">

      <p class="lead">PHP</p>
      <p class="lead">Java</p>

      <p id="targetparagraph" class="lead fw-semibold text-dark">

        Click on "Python" to see the effect.
      </p>

  <script>
    document.getElementById("targetparagraph").onclick = function() {
      this.style.color = "#F0B7A4";
      this.style.backgroundColor = "#F18C8E";
      this.style.padding = "10px";
      this.style.borderRadius = "5px";
    };
  </script>
