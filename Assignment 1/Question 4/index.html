<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Question 4</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">


  <header class="bg-dark text-white py-4 shadow">
    <div class="container text-center">
      <h1 class="fw-bold">Dynamic Websites & Applications</h1>
      <h4 class="text-warning">Module 1 – Question 4</h4>

      <hr class="bg-light">

      <p class="mb-1"><strong>Student Name:</strong> Alcardo Terlonge</p>
      <p class="mb-0"><strong>Lecturer:</strong> </p>
    </div>
  </header>


  <div class="container mt-5">
    
    <div class="card shadow-lg p-4 text-center">

      <h3 class="text-primary mb-4">
        Create a Paragraph and Append Text Using Template Literals
      </h3>

      <p class="text-muted">
        Click the button below to create a dynamic paragraph.
      </p>

      <button class="btn btn-success px-4" onclick="createParagraph()">
        Create Paragraph
      </button>

    </div>
  </div>

  <script>
    function createParagraph() {

 
      let newPara = document.createElement("p");

      let language = "JavaScript";

   
      newPara.innerHTML = `
        Lorem ipsum dolor sit amet, consectetur adipisicing elit, sed do eiusmod
        tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam,
        quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo
        consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse
        cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non
        proident, sunt in culpa qui officia deserunt mollit anim id est laborum.<br>
          <strong>
            This paragraph was created dynamically using 
            ${language}
          </strong>.
      `;

   
      newPara.className = "alert alert-info text-center mt-4";

    
      document.body.appendChild(newPara);
    }
  </script>

</body>
</html>
