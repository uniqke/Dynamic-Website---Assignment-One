<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Question 6</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <header class="bg-dark text-white py-4 shadow">
    <div class="container text-center">
      <h1 class="fw-bold">Dynamic Websites & Applications</h1>
      <h4 class="text-warning">Module 1 – Question 6</h4>

      <hr class="bg-light">

      <p class="mb-1"><strong>Student Name:</strong> Alcardo Terlonge</p>
      <p class="mb-0"><strong>Lecturer:</strong> __________________________</p>
    </div>
  </header>

  <div class="container mt-5">
    
    <div class="card shadow-lg p-4 text-center">

      <h3 class="text-primary mb-4">
        Change Background Color of Divs with Class "tutorial"
      </h3>

      <div class="tutorial p-3 mb-3 border rounded">
        <p class="mb-0">PHP</p>
      </div>

      <div class="p-3 mb-3 border rounded">
        <p class="mb-0">Java</p>
      </div>

      <div class="tutorial p-3 mb-3 border rounded">
        <p class="mb-0">Python</p>
      </div>

      <button id="btn1" class="btn btn-warning mt-3">
        Click to See the Effect
      </button>

    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {

      document.getElementById("btn1").addEventListener("click", function () {

        let tutorialDivs = document.getElementsByClassName("tutorial");

        for (let i = 0; i < tutorialDivs.length; i++) {
          tutorialDivs[i].style.backgroundColor = "yellow";
        }

      });

    });
  </script>

</body>
</html>
